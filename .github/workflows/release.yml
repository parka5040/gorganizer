name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (defaults to current ref)'
        required: false

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${GITHUB_REF#refs/tags/}"
          else
            tag="${{ github.event.inputs.tag }}"
            [ -z "$tag" ] && tag="$(git describe --tags --always)"
          fi
          echo "tag=$tag"     >> "$GITHUB_OUTPUT"
          echo "commit=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "asset=gorganizer-${tag}-linux-x86_64.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Install build deps (apt)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++ pkg-config \
            qt6-base-dev \
            libgrpc++-dev libprotobuf-dev \
            protobuf-compiler protobuf-compiler-grpc \
            libfuse3-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          check-latest: true

      - name: Install Go protobuf plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Generate protobuf
        run: make proto

      - name: Build Go binaries
        env:
          VERSION: ${{ steps.ver.outputs.tag }}
          COMMIT:  ${{ steps.ver.outputs.commit }}
          DATE:    ${{ steps.ver.outputs.date }}
        run: |
          mkdir -p stage/bin
          ldflags="-s -w -X main.version=$VERSION -X main.commit=$COMMIT -X main.buildDate=$DATE"
          go build -trimpath -ldflags="$ldflags" -o stage/bin/gorganizerd  ./cmd/gorganizerd
          go build -trimpath -ldflags="$ldflags" -o stage/bin/gorganizerctl ./cmd/gorganizerctl

      - name: Build Qt6 frontend
        env:
          VERSION: ${{ steps.ver.outputs.tag }}
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DGORGANIZER_VERSION="$VERSION"
          cmake --build build --parallel
          cp build/src/gorganizer stage/bin/gorganizer-gui

      - name: Stage tarball tree
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          root="gorganizer-${TAG}-linux-x86_64"
          mkdir -p "release/$root/bin" \
                   "release/$root/libexec" \
                   "release/$root/share/applications" \
                   "release/$root/share/icons/hicolor/256x256/apps"

          cp stage/bin/gorganizerd     "release/$root/bin/"
          cp stage/bin/gorganizerctl   "release/$root/bin/"
          cp stage/bin/gorganizer-gui  "release/$root/bin/"

          cp scripts/gorganizer-launcher.in        "release/$root/libexec/gorganizer-launcher"
          cp dist/gorganizer.desktop.in            "release/$root/share/applications/"
          cp dist/gorganizer-nxm.desktop.in        "release/$root/share/applications/"

          if [ -f resources/icons/gorganizer.png ]; then
            cp resources/icons/gorganizer.png \
               "release/$root/share/icons/hicolor/256x256/apps/gorganizer.png"
          fi

          cp install.sh   "release/$root/install.sh"
          cp uninstall.sh "release/$root/uninstall.sh"
          cp LICENSE      "release/$root/LICENSE" 2>/dev/null || true
          cp README.md    "release/$root/README.md" 2>/dev/null || true
          echo "$TAG" > "release/$root/VERSION"

          chmod +x "release/$root/bin/"* \
                   "release/$root/libexec/gorganizer-launcher" \
                   "release/$root/install.sh" \
                   "release/$root/uninstall.sh"

      - name: Create tarball + checksum
        env:
          ASSET: ${{ steps.ver.outputs.asset }}
        run: |
          ( cd release && tar -czf "../$ASSET" "gorganizer-${{ steps.ver.outputs.tag }}-linux-x86_64" )
          sha256sum "$ASSET" > "$ASSET.sha256"
          ls -lh "$ASSET" "$ASSET.sha256"

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: ${{ steps.ver.outputs.asset }}

      - name: Publish GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.ver.outputs.asset }}
            ${{ steps.ver.outputs.asset }}.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true

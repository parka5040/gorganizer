enum FomodGroupType {
  FOMOD_GROUP_SELECT_ANY = 0;
  FOMOD_GROUP_SELECT_AT_MOST_ONE = 1;
  FOMOD_GROUP_SELECT_EXACTLY_ONE = 2;
  FOMOD_GROUP_SELECT_AT_LEAST_ONE = 3;
  FOMOD_GROUP_SELECT_ALL = 4;
}

enum FomodPluginState {
  FOMOD_PLUGIN_OPTIONAL = 0;
  FOMOD_PLUGIN_REQUIRED = 1;
  FOMOD_PLUGIN_RECOMMENDED = 2;
  FOMOD_PLUGIN_COULD_BE_USABLE = 3;
  FOMOD_PLUGIN_NOT_USABLE = 4;
}

message FomodPlugin {
  string name = 1;
  string description = 2;
  string image_path = 3;
  repeated FomodFile files = 4;
  FomodPluginState default_state = 5;
}

message FomodGroup {
  string name = 1;
  FomodGroupType type = 2;
  repeated FomodPlugin plugins = 3;
}

message FomodStep {
  string name = 1;
  repeated FomodGroup groups = 2;
}

message FomodPlan {
  string module_name = 1;
  string module_path = 2;               // root that holds fomod/ (daemon-local, opaque to client)
  repeated FomodFile required_files = 3;
  repeated FomodStep steps = 4;

  // Legacy NMM-style FOMOD: archive has fomod/info.xml and (optionally) a
  // C# script.cs but NO ModuleConfig.xml. We surface a simple info popup
  // instead of a multi-step wizard, then install everything outside fomod/
  // as a flat copy. The C# script is intentionally NOT executed.
  bool legacy_info_only = 5;
  string description = 6;               // from fomod/info.xml <Description>
  string screenshot_path = 7;           // absolute path to a screenshot in fomod/, or empty
  string version = 8;                   // from fomod/info.xml <Version>
  string author = 9;                    // from fomod/info.xml <Author>
}


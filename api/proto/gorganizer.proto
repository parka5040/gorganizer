message GetTTWInstallResultRequest {
  string install_id = 1;
  // When true, block until the install finishes (capped server-side at
  // 1 hour). False returns whatever's available — useful for polling
  // immediately after detecting an `[<id>:exit]` event.
  bool block = 2;
}

message TTWExeDelta {
  // Path relative to the root the delta came from (FNV install dir for
  // changed_exes_in_root entries, or the dest mod folder for
  // dest_mod_exes entries).
  string rel_path = 1;
  // "added" | "modified" | "in-dest"
  string kind = 2;
  int64 size = 3;
  string mtime = 4;     // RFC3339
  string sha256 = 5;    // populated only for the candidate set; may be empty
}

message GetTTWInstallResultResponse {
  int32 installer_exit_code = 1;
  bool layout_fixed = 2;
  int32 data_mod_file_count = 3;
  int64 data_mod_bytes = 4;
  // Newly-added or size/mtime-modified .exe files in the FNV install
  // root. TTW manifests can write a custom launcher here; surface the
  // candidates so the user can pick the right one.
  repeated TTWExeDelta changed_exes_in_root = 5;
  // .exe files found inside the destination mod folder. Some MPI
  // manifests park the launcher at %DESTINATION% rather than %FNVROOT%.
  repeated TTWExeDelta data_mod_exes = 6;
}

message SetTTWLauncherExeRequest {
  string rel_path = 1;        // e.g. "nvse_loader.exe"
}
message SetTTWLauncherExeResponse {}


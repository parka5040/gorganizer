// --- Tale of Two Wastelands messages ---

enum TTWBackend {
  TTW_BACKEND_NATIVE = 0;  // SulfurNitride mpi_installer (default, recommended)
  TTW_BACKEND_WINE   = 1;  // closed-source TTW Install.exe under Proton
}

message CheckTTWPrereqsRequest {
  TTWBackend backend = 1;
}
message CheckTTWPrereqsResponse {
  TTWBackend backend = 1;
  bool gstreamer_installed = 2;
  string gstreamer_codecs_hint = 3;
  bool xdelta_installed = 4;
  int64 disk_space_available = 5;
  int64 disk_space_required = 6;
  bool fnv_vanilla = 7;

  // Backend B (native).
  string mpi_installer_path = 8;
  string mpi_installer_version = 9;

  // Backend A (Wine).
  bool prefix_exists = 10;
  bool has_dotnet48 = 11;
  uint32 dotnet48_release_rev = 12;
  bool has_msxml6 = 13;
  bool has_vcrun2022 = 14;
  bool has_corefonts = 15;
  bool mono_needs_removal = 16;
  bool steam_running = 17;
  bool protontricks_available = 18;
  bool winetricks_available = 19;

  repeated string missing = 20;
}

message CheckTTWDiskSpaceRequest {}
message CheckTTWDiskSpaceResponse {
  int64 available = 1;
  int64 required = 2;
}

message CheckFNVNotMountedRequest {}
message CheckFNVNotMountedResponse {}

message PrepareTTWInstallerRequest {
  string user_path = 1;       // file or directory the user picked
  TTWBackend backend = 2;
}
message PrepareTTWInstallerResponse {
  TTWBackend backend = 1;
  string mpi_file = 2;
  string installer_exe = 3;   // populated for Backend A only
  string version = 4;         // best-effort version parse from .mpi filename
  repeated string alternate_mpis = 5;
}

message CreateBlankTTWModRequest {
  string mod_name = 1;
}
message CreateBlankTTWModResponse {
  string mod_dir = 1;
}

message EnsureNativeMpiInstallerRequest {}
message EnsureNativeMpiInstallerResponse {
  string path = 1;
  string version = 2;
}

message BootstrapFNVPrefixRequest {}
message BootstrapFNVPrefixResponse {}

message InstallTTWPrereqsRequest {}
message InstallTTWPrereqsResponse {
  // Opaque handle the GUI passes back to CancelTTWInstaller if the user
  // wants to abort. Streams progress via Info events on WatchStatus.
  string install_id = 1;
}

message LaunchTTWInstallerRequest {
  PrepareTTWInstallerResponse info = 1;
  string data_mod_name = 2;
}
message LaunchTTWInstallerResponse {
  string install_id = 1;
}

message CancelTTWInstallerRequest {
  string install_id = 1;
}
